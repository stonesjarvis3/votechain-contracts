<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VoteChain governance proposals — view active votes, results, and time remaining." />
  <title>VoteChain — Proposals</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <!-- Skip-to-content link for keyboard / screen-reader users (WCAG 2.4.1) -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a href="/" class="logo" aria-label="VoteChain home">
        <svg aria-hidden="true" focusable="false" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/>
          <path d="M8 14l4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        VoteChain
      </a>
      <nav aria-label="Primary navigation">
        <ul class="nav-list" role="list">
          <li><a href="#" aria-current="page">Proposals</a></li>
          <li><a href="#">Docs</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content" tabindex="-1">
    <div class="container">

      <!-- Page heading -->
      <div class="page-heading">
        <h1>Governance Proposals</h1>
        <p class="page-subtitle">Browse, filter, and track all on-chain governance proposals.</p>
      </div>

      <!-- Filter / search bar -->
      <section class="toolbar" aria-label="Filter proposals">
        <div class="search-wrap">
          <label for="search-input" class="sr-only">Search proposals</label>
          <svg class="search-icon" aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            id="search-input"
            type="search"
            placeholder="Search proposals…"
            aria-label="Search proposals"
            autocomplete="off"
          />
        </div>

        <div class="filter-wrap" role="group" aria-label="Filter by status">
          <button class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
          <button class="filter-btn" data-filter="active" aria-pressed="false">Active</button>
          <button class="filter-btn" data-filter="passed" aria-pressed="false">Passed</button>
          <button class="filter-btn" data-filter="rejected" aria-pressed="false">Rejected</button>
          <button class="filter-btn" data-filter="executed" aria-pressed="false">Executed</button>
          <button class="filter-btn" data-filter="cancelled" aria-pressed="false">Cancelled</button>
        </div>
      </section>

      <!-- Live region for dynamic announcements (WCAG 4.1.3) -->
      <div id="live-region" aria-live="polite" aria-atomic="true" class="sr-only"></div>

      <!-- Proposal list -->
      <section aria-label="Proposal list">
        <ul id="proposal-list" class="proposal-list" role="list">
          <!-- Populated by proposals.js -->
        </ul>

        <!-- Empty state -->
        <div id="empty-state" class="empty-state" hidden aria-live="polite">
          <svg aria-hidden="true" focusable="false" width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2" opacity=".3"/>
            <path d="M16 24h16M24 16v16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".3"/>
          </svg>
          <p>No proposals match your filter.</p>
        </div>
      </section>

      <!-- Pagination -->
      <nav class="pagination" aria-label="Proposal pagination" id="pagination">
        <button id="prev-btn" class="page-btn" aria-label="Previous page" disabled>
          <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Previous
        </button>
        <span id="page-info" aria-live="polite" aria-atomic="true" class="page-info"></span>
        <button id="next-btn" class="page-btn" aria-label="Next page">
          Next
          <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </nav>

    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p>VoteChain is open-source software licensed under the <a href="https://www.apache.org/licenses/LICENSE-2.0" rel="noopener noreferrer">Apache 2.0 License</a>.</p>
    </div>
  </footer>

  <script src="src/proposals.js"></script>
</body>
</html>
