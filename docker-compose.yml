services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    # Readiness probe: /ready ensures backend + Redis are connected
    # Liveness probe:  /live ensures the process is alive
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  dev:
    build: .
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    working_dir: /app
    environment:
      - NETWORK=local
    depends_on:
      - stellar-node
    stdin_open: true
    tty: true

  stellar-node:
    image: stellar/quickstart:latest
    ports:
      - "8000:8000"
    environment:
      - ENABLE_SOROBAN_RPC=true
    command: --local

volumes:
  cargo-cache:
