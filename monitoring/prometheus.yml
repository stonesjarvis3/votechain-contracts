global:
  scrape_interval: 15s
  evaluation_interval: 15s
  alerting:
    alertmanagers:
      - static_configs:
          - targets:
              - alertmanager:9093

rule_files:
  - "alerts.yml"

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Contract deployment metrics
  - job_name: "votechain-contracts"
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s

  # Stellar RPC metrics (if available)
  - job_name: "stellar-rpc"
    static_configs:
      - targets: ["stellar-rpc:11626"]
    metrics_path: "/metrics"

  # PostgreSQL metrics (if available)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
