# AlertManager Configuration

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

route:
  receiver: "default"
  group_by: ["alertname", "cluster", "service"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: "critical"
      continue: true
      repeat_interval: 5m

    - match:
        severity: warning
      receiver: "warning"
      continue: true
      repeat_interval: 1h

receivers:
  - name: "default"
    slack_configs:
      - channel: "#alerts"
        title: "VoteChain Alert"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

  - name: "critical"
    slack_configs:
      - channel: "#critical-alerts"
        title: "🚨 CRITICAL ALERT"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY}"
        description: "{{ .GroupLabels.alertname }}"

  - name: "warning"
    slack_configs:
      - channel: "#alerts"
        title: "⚠️ WARNING"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "dev", "instance"]
