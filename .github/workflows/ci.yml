name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
env:
  CARGO_TERM_COLOR: always
jobs:
  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Apache 2.0 license header on all .rs files
        run: |
          missing=()
          while IFS= read -r -d '' file; do
            if ! head -3 "$file" | grep -q "Apache License\|Apache-2.0\|Licensed under the Apache"; then
              missing+=("$file")
            fi
          done < <(find contracts -name "*.rs" -print0)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing Apache 2.0 license header in:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All .rs files have the license header."

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-
            ${{ runner.os }}-cargo-
      - name: Install cargo-llvm-cov
        run: cargo install --locked cargo-llvm-cov
      - name: Generate coverage report
        run: |
          cargo llvm-cov --all-features --workspace \
            --lcov --output-path lcov.info
      - name: Enforce 80% line coverage threshold
        run: |
          PACKAGES=(votechain-governance votechain-token)
          for pkg in "${PACKAGES[@]}"; do
            cargo llvm-cov --package "$pkg" --all-features --summary-only 2>&1 | tee "${pkg}-coverage-summary.txt"
            LINE_PCT=$(grep -oP 'Lines\s*:\s*\K[0-9]+\.[0-9]+' "${pkg}-coverage-summary.txt" | head -1)
            echo "$pkg line coverage: ${LINE_PCT}%"
            awk -v pct="$LINE_PCT" -v pkg="$pkg" 'BEGIN { if (pct+0 < 80) { print pkg " coverage " pct "% is below 80% threshold"; exit 1 } }'
          done
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            *-coverage-summary.txt

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
            ${{ runner.os }}-cargo-
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Update advisory database
        run: cargo audit fetch
      - name: Run cargo audit
        run: cargo audit --deny warnings

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install --locked stellar-cli --features opt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-
      - run: stellar contract build
      - name: Check WASM binary sizes
        run: |
          WASM_DIR="target/wasm32-unknown-unknown/release"
          GOV_WASM="$WASM_DIR/votechain_governance.wasm"
          TOK_WASM="$WASM_DIR/votechain_token.wasm"
          GOV_LIMIT=$((100 * 1024))   # 100 KB
          TOK_LIMIT=$((50 * 1024))    # 50 KB

          gov_size=$(stat -c%s "$GOV_WASM")
          tok_size=$(stat -c%s "$TOK_WASM")

          echo "governance.wasm : $gov_size bytes (limit: $GOV_LIMIT)"
          echo "token.wasm      : $tok_size bytes (limit: $TOK_LIMIT)"

          # Write size log artifact
          mkdir -p wasm-size-history
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) governance=$gov_size token=$tok_size" \
            >> wasm-size-history/sizes.log

          if [ "$gov_size" -gt "$GOV_LIMIT" ]; then
            echo "ERROR: governance.wasm ($gov_size bytes) exceeds 100 KB limit" >&2
            exit 1
          fi
          if [ "$tok_size" -gt "$TOK_LIMIT" ]; then
            echo "ERROR: token.wasm ($tok_size bytes) exceeds 50 KB limit" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-size-history
          path: wasm-size-history/sizes.log
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm

  wasm-validity:
    name: WASM Validity Tests
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install --locked stellar-cli --features opt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-
      - name: Run WASM validity tests
        run: bash scripts/test_wasm.sh
