name: CodeQL Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: github/codeql-action/init@fee9466b8957867761f2d78f922ab084e3e2dd17
        with:
          languages: rust
      - uses: github/codeql-action/autobuild@fee9466b8957867761f2d78f922ab084e3e2dd17
      - uses: github/codeql-action/analyze@fee9466b8957867761f2d78f922ab084e3e2dd17
