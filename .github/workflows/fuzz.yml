name: Fuzz (nightly, optional)

# Runs nightly on main, or on-demand via workflow_dispatch.
# Non-blocking — failures are surfaced as annotations but do not gate merges.
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Seconds to fuzz per target"
        required: false
        default: "120"

env:
  FUZZ_DIR: contracts/governance

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_create_proposal
          - fuzz_cast_vote
          - fuzz_finalise

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-fuzz-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fuzz-${{ matrix.target }}-
            ${{ runner.os }}-fuzz-

      - name: Install cargo-fuzz
        run: cargo install --locked cargo-fuzz

      - name: Run fuzz target — ${{ matrix.target }}
        working-directory: ${{ env.FUZZ_DIR }}
        run: |
          DURATION="${{ github.event.inputs.fuzz_duration || '120' }}"
          cargo fuzz run ${{ matrix.target }} -- -max_total_time="$DURATION"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: ${{ env.FUZZ_DIR }}/fuzz/artifacts/${{ matrix.target }}/
