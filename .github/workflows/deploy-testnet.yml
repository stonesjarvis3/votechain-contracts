name: Deploy to Testnet

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/deploy-testnet.yml'
      - 'scripts/deploy.sh'

concurrency:
  group: deploy-testnet
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Contracts
    runs-on: ubuntu-latest
    outputs:
      wasm-tag: ${{ steps.meta.outputs.tags }}
      wasm-digest: ${{ steps.meta.outputs.digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build WASM contracts
        run: stellar contract build

      - name: Verify WASM binaries
        run: |
          ls -lh target/wasm32-unknown-unknown/release/*.wasm
          file target/wasm32-unknown-unknown/release/*.wasm

      - name: Generate build metadata
        id: meta
        run: |
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "git-sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          WASM_TAG="testnet-$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_SHA::8}"
          echo "tags=$WASM_TAG" >> "$GITHUB_OUTPUT"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts-${{ steps.meta.outputs.tags }}
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30
          if-no-files-found: error

  deploy:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testnet
      url: https://testnet.stellar.expert
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deploy-
            ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build WASM contracts
        run: stellar contract build

      - name: Configure Stellar CLI for testnet
        run: |
          mkdir -p ~/.stellar
          cat > ~/.stellar/networks.toml << 'NETWORKS_EOF'
          [[networks]]
          name = "testnet"
          rpc-url = "https://soroban-testnet.stellar.org"
          network-passphrase = "Test SDF Network ; September 2015"
          NETWORKS_EOF
          cat ~/.stellar/networks.toml

      - name: Verify deployment prerequisites
        run: |
          echo "✓ Stellar CLI version:"
          stellar --version
          echo "✓ WASM contracts ready:"
          ls -lh target/wasm32-unknown-unknown/release/*.wasm
          echo "✓ Deployment config:"
          cat config/testnet.toml

      - name: Deploy contracts to testnet
        id: deploy
        env:
          SOROBAN_ACCOUNT: ${{ secrets.SOROBAN_ACCOUNT }}
          SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_SECRET_KEY }}
          DEPLOYMENT_ENV: testnet
        run: |
          set -euo pipefail
          
          # Verify secrets are configured
          if [[ -z "$SOROBAN_ACCOUNT" ]]; then
            echo "❌ Error: SOROBAN_ACCOUNT secret not configured"
            exit 1
          fi
          if [[ -z "$SOROBAN_SECRET_KEY" ]]; then
            echo "❌ Error: SOROBAN_SECRET_KEY secret not configured"
            exit 1
          fi
          
          echo "🚀 Starting deployment to testnet..."
          
          # Set Stellar CLI credentials
          export SOROBAN_RPC_URL="https://soroban-testnet.stellar.org"
          export SOROBAN_NETWORK_PASSPHRASE="Test SDF Network ; September 2015"
          
          # Run deployment script
          chmod +x scripts/deploy.sh
          NETWORK=testnet ./scripts/deploy.sh 2>&1 | tee deployment.log
          
          # Capture deployment output for status
          DEPLOYMENT_OUTPUT=$(cat deployment.log)
          echo "deployment-output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DEPLOYMENT_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          
          echo "✅ Deployment completed successfully"

      - name: Create deployment report
        if: always()
        run: |
          cat > deployment-report.md << 'REPORT_EOF'
          # 🚀 Testnet Deployment Report
          
          **Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Git SHA:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          
          ## Build Information
          - Build Status: ${{ job.status }}
          - WASM Tag: ${{ needs.build.outputs.wasm-tag }}
          
          ## Deployment Information
          - Environment: Testnet (Test SDF Network)
          - RPC URL: https://soroban-testnet.stellar.org
          - Deployment Status: ${{ steps.deploy.outcome }}
          - Account: configured via GitHub Secrets
          
          ## Contracts Deployed
          - votechain_token.wasm
          - votechain_governance.wasm
          
          ## Next Steps
          1. Verify contracts on testnet explorer: https://testnet.stellar.expert
          2. Run integration tests against deployed contracts
          3. Monitor contract events and state changes
          
          ## Troubleshooting
          If deployment failed:
          - Check Stellar CLI is installed correctly
          - Verify SOROBAN_ACCOUNT and SOROBAN_SECRET_KEY secrets are set
          - Ensure account has sufficient testnet XLM balance for deployment
          - Check network connectivity to https://soroban-testnet.stellar.org
          
          REPORT_EOF
          cat deployment-report.md

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs-${{ github.run_id }}
          path: |
            deployment.log
            deployment-report.md
          retention-days: 30

      - name: Notify deployment status
        if: always()
        run: |
          if [[ "${{ steps.deploy.outcome }}" == "success" ]]; then
            echo "✅ Deployment to testnet succeeded"
            echo "📊 View contracts: https://testnet.stellar.expert"
          else
            echo "❌ Deployment to testnet failed"
            echo "📋 Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            exit 1
          fi

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Verify contracts on testnet
        env:
          SOROBAN_ACCOUNT: ${{ secrets.SOROBAN_ACCOUNT }}
        run: |
          set -euo pipefail
          
          echo "🔍 Verifying deployed contracts..."
          
          # Set testnet RPC
          export SOROBAN_RPC_URL="https://soroban-testnet.stellar.org"
          export SOROBAN_NETWORK_PASSPHRASE="Test SDF Network ; September 2015"
          
          # List account contracts
          echo "📋 Contracts for configured deployment account:"
          stellar contract info --id "$SOROBAN_ACCOUNT" || echo "Contract verification requires additional setup"
          
          echo "✅ Verification complete"

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build, deploy, verify]
    if: always()
    steps:
      - name: Create status summary
        run: |
          echo "## Testnet Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Deployment status
        if: needs.deploy.result == 'success'
        run: echo "✅ Testnet deployment completed successfully"

      - name: Deployment failure notice
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Testnet deployment failed"
          exit 1
