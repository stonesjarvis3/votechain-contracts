name: Secret Scanning

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  secret_scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for Stellar secret keys
        run: |
          set -euo pipefail
          patterns_file=".github/secret-scanning/stellar-patterns.txt"
          echo "Scanning for Stellar secret keys using patterns from $patterns_file"
          matches=$(grep -E -v '^#' "$patterns_file" | git grep -RInE -f - -- . ':!*.md' ':!*.png' ':!*.jpg' ':!*.jpeg' ':!*.gif' ':!*.svg' ':!*.pdf' ':!*.lock' ':!node_modules/*' ':!.github/secret-scanning/stellar-patterns.txt' || true)
          if [ -n "$matches" ]; then
            echo "Potential Stellar secret keys detected:"
            echo "$matches"
            exit 1
          fi
          echo "No Stellar secret keys detected."
