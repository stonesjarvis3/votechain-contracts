name: Cross-Browser E2E Tests

# Runs on every PR that touches frontend/, weekly for regression detection,
# and on demand. Separate from frontend-ci.yml which does fast chromium-only
# feedback on every push.
on:
  pull_request:
    paths:
      - 'frontend/**'
  schedule:
    - cron: "0 4 * * 1"   # 04:00 UTC every Monday
  workflow_dispatch:

jobs:
  e2e-cross-browser:
    name: E2E – ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # run all browsers even if one fails
      matrix:
        browser: [chromium, firefox, webkit]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}-${{ github.run_id }}
          path: frontend/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}-${{ github.run_id }}
          path: frontend/test-results
          retention-days: 7
          if-no-files-found: ignore

  report:
    name: Cross-Browser Summary
    runs-on: ubuntu-latest
    needs: e2e-cross-browser
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Cross-Browser E2E Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Browser | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Chromium | ${{ needs.e2e-cross-browser.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Firefox  | ${{ needs.e2e-cross-browser.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| WebKit   | ${{ needs.e2e-cross-browser.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Playwright reports uploaded as artifacts for each browser." >> "$GITHUB_STEP_SUMMARY"
